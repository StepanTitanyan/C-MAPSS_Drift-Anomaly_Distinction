# =============================================================================
# Drift-Aware Probabilistic Anomaly Detection — Master Configuration
# =============================================================================
# Every tunable parameter lives here. Nothing is hardcoded in source files.
# =============================================================================

paths:
  raw_data_dir: "data/raw/CMAPSSDataset"
  processed_dir: "data/processed"
  output_dir: "outputs"
  model_dir: "outputs/models"
  figure_dir: "outputs/figures"
  results_dir: "outputs/results"
  log_dir: "outputs/logs"

dataset:
  subset: "FD001"
  index_cols: ["unit_nr", "time_cycles"]
  setting_cols: ["setting_1", "setting_2", "setting_3"]
  sensor_cols: ["s_1", "s_2", "s_3", "s_4", "s_5", "s_6", "s_7",
                "s_8", "s_9", "s_10", "s_11", "s_12", "s_13",
                "s_14", "s_15", "s_16", "s_17", "s_18", "s_19",
                "s_20", "s_21"]
  drop_sensors_zero_var: ["s_1", "s_5", "s_6", "s_10", "s_16", "s_18", "s_19"]
  drop_sensors_weak_corr: ["s_9", "s_14"]
  selected_sensors: ["s_3", "s_4", "s_11", "s_17", "s_7", "s_12", "s_20"]
  extended_sensors: ["s_2", "s_3", "s_4", "s_7", "s_8", "s_11", "s_12",
                     "s_13", "s_15", "s_17", "s_20", "s_21"]

preprocessing:
  normal_life_fraction_threshold: 0.5
  window_size: 30
  forecast_horizon: 1
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  split_random_seed: 42

model:
  #PRIMARY MODEL: Gaussian GRU — same validation NLL as LSTM but trains faster (42 vs 49 epochs)
  primary: "gaussian_gru"
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  sigma_min: 1.0e-4
  sigma_activation: "softplus"
  latent_dim: 32

training:
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 1.0e-5
  max_epochs: 100
  early_stopping_patience: 15
  lr_scheduler:
    type: "reduce_on_plateau"
    factor: 0.5
    patience: 7
    min_lr: 1.0e-6
  gradient_clip_norm: 1.0
  num_workers: 0
  random_seed: 42

anomaly_scoring:
  score_type: "nll"
  smoothing:
    enabled: true
    alpha: 0.2
  thresholds:
    percentiles: [95.0, 97.5, 99.0]
    primary_percentile: 97.5

synthetic_anomalies:
  magnitudes: [2.0, 3.0, 5.0]
  injection_positions:
    early: 0.2
    mid: 0.5
    late: 0.8
  spike:
    duration: 1
  drop:
    duration: 1
  persistent_offset:
    durations: [5, 10, 15]
  noise_burst:
    durations: [5, 10, 15]
    variance_multiplier: 3.0
  sensor_freeze:
    durations: [5, 10, 20]
  multi_sensor:
    num_sensors: [2, 3]
  random_seed: 123

synthetic_drift:
  rates: [0.01, 0.03, 0.05]
  durations: [30, 60, 100]
  gradual_shift:
    shape: "linear"
  slow_plateau:
    shape: "sigmoid"
    transition_width: 20
  regime_change:
    slope_change_factor: 1.5
  accelerating:
    shape: "quadratic"
  random_seed: 456

drift_classifier:
  analysis_window: 15
  models: ["logistic_regression", "random_forest", "xgboost"]
  random_forest:
    n_estimators: 100
    max_depth: 6
  random_seed: 789

evaluation:
  life_fraction_buckets:
    early: [0.0, 0.3]
    middle: [0.3, 0.7]
    late: [0.7, 1.0]

visualization:
  figure_dpi: 150
  figure_format: "png"
  style: "seaborn-v0_8-whitegrid"
